<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#BBDEFB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90CAF9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC407A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D81B60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pillGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#1976D2" opacity="0.08"/>
  <circle cx="700" cy="420" r="80" fill="#1976D2" opacity="0.06"/>
  <circle cx="650" cy="100" r="50" fill="#EC407A" opacity="0.08"/>
  
  <!-- Main illustration area -->
  <g transform="translate(150, 80)">
    <!-- Doctor figure -->
    <g transform="translate(50, 50)">
      <circle cx="50" cy="40" r="30" fill="#1976D2"/>
      <path d="M 50 70 L 50 140 M 25 100 L 75 100 M 50 140 L 30 190 M 50 140 L 70 190" stroke="#1976D2" stroke-width="10" stroke-linecap="round"/>
      <!-- Stethoscope -->
      <path d="M 30 100 Q 30 80, 40 80" stroke="#1976D2" stroke-width="4" fill="none"/>
      <circle cx="40" cy="80" r="6" fill="#1976D2"/>
    </g>
    
    <!-- Patient figure -->
    <g transform="translate(350, 50)">
      <circle cx="50" cy="40" r="30" fill="#EC407A"/>
      <path d="M 50 70 L 50 140 M 25 100 L 75 100 M 50 140 L 30 190 M 50 140 L 70 190" stroke="#EC407A" stroke-width="10" stroke-linecap="round"/>
    </g>
    
    <!-- Consultation table/desk -->
    <rect x="120" y="180" width="180" height="15" rx="7" fill="#1976D2" opacity="0.3"/>
    
    <!-- Medical clipboard with information -->
    <g transform="translate(170, 100)">
      <rect x="0" y="0" width="80" height="110" rx="8" fill="white" stroke="#1976D2" stroke-width="3"/>
      <rect x="20" y="-5" width="40" height="12" rx="6" fill="#1976D2"/>
      <line x1="10" y1="25" x2="70" y2="25" stroke="#1976D2" stroke-width="3"/>
      <line x1="10" y1="40" x2="70" y2="40" stroke="#1976D2" stroke-width="3"/>
      <line x1="10" y1="55" x2="70" y2="55" stroke="#1976D2" stroke-width="3"/>
      <line x1="10" y1="70" x2="70" y2="70" stroke="#1976D2" stroke-width="3"/>
      <line x1="10" y1="85" x2="70" y2="85" stroke="#1976D2" stroke-width="3"/>
    </g>
    
    <!-- Birth control pills display -->
    <g transform="translate(0, 250)">
      <!-- Pill pack -->
      <rect x="50" y="0" width="140" height="90" rx="10" fill="white" stroke="#1976D2" stroke-width="3"/>
      
      <!-- Individual pills in pack -->
      <circle cx="75" cy="25" r="12" fill="url(#pillGrad1)"/>
      <circle cx="105" cy="25" r="12" fill="url(#pillGrad2)"/>
      <circle cx="135" cy="25" r="12" fill="url(#pillGrad3)"/>
      <circle cx="165" cy="25" r="12" fill="url(#pillGrad1)"/>
      
      <circle cx="75" cy="50" r="12" fill="url(#pillGrad2)"/>
      <circle cx="105" cy="50" r="12" fill="url(#pillGrad3)"/>
      <circle cx="135" cy="50" r="12" fill="url(#pillGrad1)"/>
      <circle cx="165" cy="50" r="12" fill="url(#pillGrad2)"/>
      
      <circle cx="75" cy="75" r="12" fill="url(#pillGrad3)"/>
      <circle cx="105" cy="75" r="12" fill="url(#pillGrad1)"/>
      <circle cx="135" cy="75" r="12" fill="url(#pillGrad2)"/>
      <circle cx="165" cy="75" r="12" fill="url(#pillGrad3)"/>
    </g>
    
    <!-- Calendar icon -->
    <g transform="translate(250, 250)">
      <rect x="0" y="10" width="100" height="90" rx="8" fill="white" stroke="#1976D2" stroke-width="3"/>
      <rect x="0" y="10" width="100" height="25" rx="8" fill="#1976D2"/>
      <line x1="25" y1="0" x2="25" y2="20" stroke="#1976D2" stroke-width="4" stroke-linecap="round"/>
      <line x1="75" y1="0" x2="75" y2="20" stroke="#1976D2" stroke-width="4" stroke-linecap="round"/>
      
      <!-- Calendar dots -->
      <circle cx="20" cy="55" r="6" fill="#1976D2"/>
      <circle cx="40" cy="55" r="6" fill="#1976D2"/>
      <circle cx="60" cy="55" r="6" fill="#1976D2"/>
      <circle cx="80" cy="55" r="6" fill="#1976D2"/>
      <circle cx="20" cy="75" r="6" fill="#EC407A"/>
      <circle cx="40" cy="75" r="6" fill="#1976D2"/>
      <circle cx="60" cy="75" r="6" fill="#1976D2"/>
      <circle cx="80" cy="75" r="6" fill="#1976D2"/>
    </g>
    
    <!-- Medical cross symbol -->
    <g transform="translate(400, 270)">
      <rect x="15" y="0" width="12" height="50" fill="#1976D2" rx="3"/>
      <rect x="0" y="19" width="42" height="12" fill="#1976D2" rx="3"/>
    </g>
  </g>
  
  <!-- Title text -->
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0D47A1" text-anchor="middle">
    Birth Control &amp; Family Planning
  </text>
</svg>
