<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="birthControlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5CAE9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#birthControlGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="#5C6BC0" opacity="0.1"/>
  <circle cx="650" cy="400" r="100" fill="#5C6BC0" opacity="0.08"/>
  <circle cx="700" cy="150" r="60" fill="#7E57C2" opacity="0.12"/>
  
  <!-- Pills illustration -->
  <g transform="translate(250, 150)">
    <!-- Pill 1 -->
    <ellipse cx="80" cy="100" rx="35" ry="50" fill="#5C6BC0" opacity="0.8"/>
    <ellipse cx="80" cy="100" rx="25" ry="40" fill="#7986CB"/>
    
    <!-- Pill 2 -->
    <ellipse cx="160" cy="120" rx="35" ry="50" fill="#7E57C2" opacity="0.8"/>
    <ellipse cx="160" cy="120" rx="25" ry="40" fill="#9575CD"/>
    
    <!-- Pill 3 -->
    <ellipse cx="240" cy="100" rx="35" ry="50" fill="#5C6BC0" opacity="0.8"/>
    <ellipse cx="240" cy="100" rx="25" ry="40" fill="#7986CB"/>
    
    <!-- Calendar grid -->
    <rect x="50" y="180" width="220" height="160" rx="15" fill="white" opacity="0.9"/>
    <line x1="70" y1="210" x2="250" y2="210" stroke="#5C6BC0" stroke-width="3"/>
    
    <!-- Calendar dots -->
    <circle cx="90" cy="240" r="8" fill="#5C6BC0"/>
    <circle cx="120" cy="240" r="8" fill="#5C6BC0"/>
    <circle cx="150" cy="240" r="8" fill="#5C6BC0"/>
    <circle cx="180" cy="240" r="8" fill="#5C6BC0"/>
    <circle cx="210" cy="240" r="8" fill="#5C6BC0"/>
    <circle cx="90" cy="280" r="8" fill="#5C6BC0"/>
    <circle cx="120" cy="280" r="8" fill="#5C6BC0"/>
    <circle cx="150" cy="280" r="8" fill="#7E57C2"/>
    <circle cx="180" cy="280" r="8" fill="#5C6BC0"/>
    <circle cx="210" cy="280" r="8" fill="#5C6BC0"/>
  </g>
  
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#3F51B5" text-anchor="middle">
    Birth Control Options
  </text>
</svg>
