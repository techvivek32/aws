<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="prenatalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8BBD0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#prenatalGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="120" r="70" fill="#EC407A" opacity="0.1"/>
  <circle cx="680" cy="380" r="90" fill="#EC407A" opacity="0.08"/>
  <circle cx="650" cy="100" r="50" fill="#F06292" opacity="0.12"/>
  
  <!-- Baby and heart illustration -->
  <g transform="translate(300, 120)">
    <!-- Heart shape -->
    <path d="M 100 80 C 100 60, 120 50, 130 60 C 140 50, 160 60, 160 80 C 160 110, 130 140, 100 160 C 70 140, 40 110, 40 80 C 40 60, 60 50, 70 60 C 80 50, 100 60, 100 80 Z" fill="#EC407A" opacity="0.3"/>
    
    <!-- Baby silhouette -->
    <circle cx="100" cy="100" r="25" fill="#EC407A"/>
    <ellipse cx="100" cy="145" rx="35" ry="45" fill="#EC407A"/>
    
    <!-- Ultrasound waves -->
    <path d="M 180 100 Q 200 100, 220 100" stroke="#F06292" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M 180 120 Q 200 120, 220 120" stroke="#F06292" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M 180 140 Q 200 140, 220 140" stroke="#F06292" stroke-width="4" fill="none" opacity="0.6"/>
    
    <!-- Medical clipboard -->
    <rect x="-80" y="60" width="80" height="120" rx="8" fill="white" opacity="0.9"/>
    <rect x="-70" y="50" width="60" height="15" rx="7" fill="#EC407A"/>
    <line x1="-65" y1="90" x2="-15" y2="90" stroke="#EC407A" stroke-width="3"/>
    <line x1="-65" y1="110" x2="-15" y2="110" stroke="#EC407A" stroke-width="3"/>
    <line x1="-65" y1="130" x2="-15" y2="130" stroke="#EC407A" stroke-width="3"/>
    <line x1="-65" y1="150" x2="-15" y2="150" stroke="#EC407A" stroke-width="3"/>
  </g>
  
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#C2185B" text-anchor="middle">
    Prenatal Care Journey
  </text>
</svg>
