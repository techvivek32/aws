<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weightBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#weightBg)"/>
  
  <circle cx="100" cy="70" r="45" fill="#4CAF50" opacity="0.1"/>
  <circle cx="500" cy="330" r="55" fill="#4CAF50" opacity="0.08"/>
  
  <!-- Scale -->
  <g transform="translate(220, 150)">
    <rect x="30" y="60" width="80" height="15" rx="7" fill="#4CAF50"/>
    <rect x="60" y="45" width="20" height="30" fill="#4CAF50"/>
    <circle cx="70" cy="40" r="12" fill="#4CAF50"/>
    <path d="M 40 75 L 25 95 L 55 95 Z" fill="#4CAF50"/>
    <path d="M 100 75 L 85 95 L 115 95 Z" fill="#4CAF50"/>
  </g>
  
  <!-- Downward arrow (weight loss) -->
  <g transform="translate(380, 140)">
    <rect x="20" y="0" width="10" height="70" fill="#4CAF50"/>
    <polygon points="25,70 10,90 40,90" fill="#4CAF50"/>
  </g>
  
  <!-- Syringe/GLP-1 -->
  <g transform="translate(150, 250)">
    <rect x="0" y="20" width="12" height="60" rx="6" fill="#66BB6A"/>
    <rect x="2" y="5" width="8" height="18" fill="#81C784"/>
    <circle cx="6" cy="2" r="6" fill="#66BB6A"/>
    <rect x="4" y="80" width="4" height="25" fill="#4CAF50"/>
    <polygon points="6,105 2,110 10,110" fill="#4CAF50"/>
  </g>
  
  <!-- Progress chart -->
  <g transform="translate(350, 220)">
    <line x1="0" y1="80" x2="120" y2="80" stroke="#4CAF50" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="80" stroke="#4CAF50" stroke-width="2"/>
    <polyline points="0,60 30,50 60,30 90,20 120,10" stroke="#4CAF50" stroke-width="3" fill="none"/>
    <circle cx="0" cy="60" r="4" fill="#4CAF50"/>
    <circle cx="30" cy="50" r="4" fill="#4CAF50"/>
    <circle cx="60" cy="30" r="4" fill="#4CAF50"/>
    <circle cx="90" cy="20" r="4" fill="#4CAF50"/>
    <circle cx="120" cy="10" r="4" fill="#4CAF50"/>
  </g>
  
  <text x="300" y="380" font-family="Arial" font-size="24" font-weight="bold" fill="#2E7D32" text-anchor="middle">
    Medical Weight Loss
  </text>
</svg>
