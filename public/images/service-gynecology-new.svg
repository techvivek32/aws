<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gyneNewGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#gyneNewGrad)"/>
  
  <circle cx="160" cy="180" r="70" fill="#AB47BC" opacity="0.12"/>
  <circle cx="640" cy="220" r="85" fill="#AB47BC" opacity="0.1"/>
  
  <!-- Female symbol and medical cross -->
  <g transform="translate(320, 120)">
    <!-- Female symbol -->
    <circle cx="80" cy="80" r="40" stroke="#AB47BC" stroke-width="8" fill="none"/>
    <line x1="80" y1="120" x2="80" y2="180" stroke="#AB47BC" stroke-width="8"/>
    <line x1="60" y1="160" x2="100" y2="160" stroke="#AB47BC" stroke-width="8"/>
    
    <!-- Medical cross -->
    <rect x="140" y="60" width="20" height="60" fill="#8E24AA" rx="4"/>
    <rect x="130" y="70" width="40" height="20" fill="#8E24AA" rx="4"/>
    
    <!-- Stethoscope -->
    <path d="M -40 60 Q -40 30, -20 30 Q 0 30, 0 60" stroke="#AB47BC" stroke-width="6" fill="none"/>
    <circle cx="-40" cy="60" r="15" fill="#AB47BC"/>
    <circle cx="0" cy="60" r="15" fill="#AB47BC"/>
    <path d="M -20 30 L -20 120" stroke="#AB47BC" stroke-width="5"/>
    <circle cx="-20" cy="135" r="20" fill="#AB47BC"/>
    <circle cx="-20" cy="135" r="12" fill="white"/>
  </g>
  
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#7B1FA2" text-anchor="middle">
    Gynecology Services
  </text>
</svg>
